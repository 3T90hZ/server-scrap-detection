server:
  address: 0.0.0.0   # Allow connections from other devices

spring:
  application:
    name: scrap-detection

  datasource:
    url: jdbc:mysql://localhost:3306/pos_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: Tranthanh01@
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update        # Options: none, validate, update, create, create-drop
    show-sql: true            # Set to false in production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      enabled: true
  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:https://frontend-domain.com}